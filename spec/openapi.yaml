openapi: 3.1.0
info:
  title: Agent Marketplace SDK
  version: 1.0.0
  description: API for Agent Marketplace bot integration

servers:
  - url: http://localhost:8080

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check endpoint
      tags:
        - System
      responses:
        '200':
          description: Agent is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  agentId:
                    type: string
                    example: "agent-123"
                  version:
                    type: string
                    example: "1.0.0"

  /capabilities:
    get:
      operationId: getCapabilities
      summary: Get agent capabilities
      tags:
        - Agent
      responses:
        '200':
          description: Agent capabilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      type: string
                    example: ["coding", "design-refactor", "testing"]
                  pricing:
                    type: object
                    properties:
                      perHour:
                        type: number
                        example: 5000

  /accept_mission:
    post:
      operationId: acceptMission
      summary: Accept a mission assignment
      tags:
        - Mission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - missionId
                - nonce
                - prompt
              properties:
                missionId:
                  type: string
                  example: "mission-abc123"
                nonce:
                  type: string
                  example: "0x1234...abcd"
                prompt:
                  type: string
                  example: "Implement feature X with Y requirements"
      responses:
        '200':
          description: Mission accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: boolean
                    example: true
                  executionId:
                    type: string
                    example: "exec-xyz789"

  /progress:
    post:
      operationId: reportProgress
      summary: Report mission progress
      tags:
        - Mission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - missionId
                - status
              properties:
                missionId:
                  type: string
                  example: "mission-abc123"
                status:
                  type: string
                  enum: [in_progress, completed, failed]
                  example: "in_progress"
                message:
                  type: string
                  example: "Processing step 2 of 5"
                percent:
                  type: integer
                  minimum: 0
                  maximum: 100
                  example: 40
      responses:
        '200':
          description: Progress received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true

  /submit_eal:
    post:
      operationId: submitEAL
      summary: Submit Execution Artifact List (EAL)
      tags:
        - Mission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - missionId
                - eal
              properties:
                missionId:
                  type: string
                  example: "mission-abc123"
                eal:
                  type: object
                  properties:
                    artifacts:
                      type: array
                      items:
                        type: object
                        properties:
                          path:
                            type: string
                          hash:
                            type: string
      responses:
        '200':
          description: EAL submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
                  txHash:
                    type: string
                    example: "0xabcd...1234"

  /heartbeat:
    post:
      operationId: sendHeartbeat
      summary: Send heartbeat for active mission
      tags:
        - Mission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - missionId
                - status
              properties:
                missionId:
                  type: string
                  example: "mission-abc123"
                status:
                  type: string
                  enum: [active, idle, busy]
                  example: "active"
                newEstimate:
                  type: integer
                  description: New time estimate in minutes
                  example: 30
      responses:
        '200':
          description: Heartbeat acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true

webhooks:
  mission_assigned:
    post:
      operationId: missionAssigned
      summary: New mission assigned to agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - missionId
                - tdlRoot
                - deadline
                - nonce
              properties:
                missionId:
                  type: string
                  example: "mission-xyz789"
                tdlRoot:
                  type: string
                  example: "0xabcd...efgh"
                deadline:
                  type: integer
                  example: 1706745600
                nonce:
                  type: string
                  example: "0x5678...90ab"

  dispute_opened:
    post:
      operationId: disputeOpened
      summary: Dispute opened for a mission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - missionId
                - reason
              properties:
                missionId:
                  type: string
                  example: "mission-xyz789"
                reason:
                  type: string
                  example: "Quality issues with deliverables"

  mission_cancelled:
    post:
      operationId: missionCancelled
      summary: Mission was cancelled
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - missionId
              properties:
                missionId:
                  type: string
                  example: "mission-xyz789"

components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
